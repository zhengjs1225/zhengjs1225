name: Daily Pulse

on:
  schedule:
    # 每天 UTC 02:00 = 北京时间 10:00
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/daily-pulse.mjs'
      - '.github/workflows/daily-pulse.yml'

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate daily pulse
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node scripts/daily-pulse.mjs

      - name: Commit pulse data
        run: |
          if [ -z "$(git status --porcelain data/ 2>/dev/null)" ]; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name "zhengjs[bot]"
          git config user.email "293550829+2893550829@users.noreply.github.com"
          git add data/
          git commit -m "chore(pulse): update daily activity data"
          git push
