name: Update Contribution Charts

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate radar SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RADAR_USERNAME: zhengjs1225
        run: node scripts/generate-radar.mjs

      - name: Generate commit activity SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIVITY_USERNAME: zhengjs1225
        run: node scripts/generate-commit-activity.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- assets/contribution-radar.svg assets/commit-activity.svg; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-radar.svg assets/commit-activity.svg
          git commit -m "chore: refresh contribution charts"
          git push
